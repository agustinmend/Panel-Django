#docker-compose.yml
services:
  django:
    build: ./Django
    ports:
      - "8000:8000"
    env_file:
      - ./Django/config/.env

  nginx:
    image: nginx:1.25.3
    volumes:
      - ./nginx/src/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/src/site.conf:/etc/nginx/conf.d/site.conf:ro
    depends_on:
      - django
    ports:
      - "8080:80"
