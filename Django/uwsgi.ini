[uwsgi]
# path to the wsgi file generated by Django
wsgi-file = config/wsgi.py
strict = true # prevents the server from starting if it's misconfigured
socket = :8000 # port on which user requests are accepted
protocol = http
# start a master process to manage child processes
master = true
# terminate all child processes
no-orphans = true
# stop the server upon receiving the SIGTERM signal
die-on-term = true
# lazy initialization of the application
# this allows the server to start faster
# the first request received by the process will work slowly
# because the application will be initializing.
lazy-apps = true
# number of processes created by the master process
# it's recommended to set a number not exceeding the number of available CPU cores
processes = 4
# number of threads used by each process
# each user request is processed in a separate thread
# using these settings you can set the maximum number of processed requests
# in this configuration the server can handle 32 requests simultaneously
# this number is obtained by multiplying the number of processes by the number of threads
threads = 8
# by default uWSGI does not initiate the GIL, so threads will not work inside the applicat
enable-threads = true
# after how many requests to restart the worker
# this is useful for preventing memory leaks
max-requests = 500
# forcibly reload the worker if it exceeds the memory consumption threshold
reload-on-rss = 1024
# how long to wait for the worker to handle current requests before forced reload
worker-reload-mercy = 60
# after how many seconds to forcibly terminate a user request
harakiri = 60
harakiri-verbose = true
# clean up temporary files and UNIX sockets used by the server
vacuum = true
# before passing the request to the application
# uWSGI reads its contents into memory
post-buffering = 1048576
# buffer size for reading HTTP headers
buffer-size = 65535